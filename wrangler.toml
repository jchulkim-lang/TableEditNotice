# Cloudflare 설정.
# ※ Cloudflare "Pages"로 배포할 경우 D1 바인딩/환경변수는 보통 Pages 대시보드에서 설정합니다.
#    이 파일은 로컬 테스트(wrangler dev)와 Worker 배포 참고용입니다.

name = "svn-table-board"
main = "_worker.js"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "svn_table_board"
database_id = "여기에_생성된_D1_ID"

[vars]
GOOGLE_CLIENT_ID = "여기에_구글_OAuth_클라이언트ID.apps.googleusercontent.com"
ALLOWED_DOMAIN = "vicgamestudios.com"
ADMIN_EMAILS = ""

# 비밀값은 파일에 두지 말고 아래 명령으로 등록하세요(Pages는 대시보드 Secret):
#   wrangler secret put KAKAOWORK_WEBHOOK_URL
#   wrangler secret put SESSION_SECRET
